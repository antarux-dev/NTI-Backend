services:
  backend:
    container_name: backend
    build: .
    env_file: 
      - .env
    ports: 
      - "3000:3000"
    restart: on-failure
    
  database:
    container_name: database
    image: postgres:latest
    env_file: 
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  postgres_data:
services:
  database:
    container_name: database
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nti_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nti_development}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://nti_db:password@database:5432/nti_development?schema=public
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/generated
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:

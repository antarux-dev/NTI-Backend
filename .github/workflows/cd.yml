name: cd

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Backend deployment
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/antarux-dev/nti-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '/opt/nti/api.antarux.dev/'
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/nti/api.antarux.dev
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cat > .env << 'EOF'
            DATABASE_URL=${{ secrets.VPS_DATABASE_URL }}
            POSTGRES_USER=nti_db
            POSTGRES_PASSWORD=${{ secrets.VPS_POSTGRES_PASSWORD }}
            POSTGRES_DB=nti_production
            NODE_ENV=production
            PORT=3000
            EOF

            VERSION=${{ github.ref_name }} docker compose -f docker-compose.prod.yml pull
            VERSION=${{ github.ref_name }} docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f --filter "until=168h"

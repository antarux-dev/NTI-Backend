version: '3.8'

services:
  backend:
    image: ghcr.io/antarux-dev/nti-backend:${VERSION:-latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ALLOWED_ORIGINS: https://antarux.dev, https://www.antarux.dev
      POSTGRES_USER: nti_db
      POSTGRES_DB: nti_production
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - '3000:3000'
    networks:
      - nti-net

  database:
    image: postgres:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      POSTGRES_USER: nti_db
      POSTGRES_DB: nti_production
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - type: bind
        source: /opt/nti/data/postgres
        target: /var/lib/postgresql/data
    networks:
      - nti-net

secrets:
  db_password:
    external: true
    name: nti_db_password

networks:
  nti-net:
    driver: overlay